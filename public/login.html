<!-- // @build: 2026-07-01.18-30-00 | id: LOGIN-V3 | desc: Login y registro con actualización de sessionId en BD para evitar falsos conflictos de sesión -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SOS Venezuela | Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>SOS <span>Venezuela</span></h1>
  </header>

  <div class="container">
    <div id="mensaje" class="mensaje"></div>

    <!-- LOGIN -->
    <div class="card" id="loginForm">
      <div class="card-title"><i class="fa-solid fa-right-to-bracket" style="color:var(--accent);"></i> Iniciar sesión</div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="Contraseña" required>
      </div>
      <button id="btnLogin" class="btn btn-primary">Ingresar</button>
      <p style="text-align:center; margin-top:16px;"><a id="linkRegistro">¿No tiene cuenta? Regístrese</a></p>
    </div>

    <!-- REGISTRO -->
    <div class="card" id="registroForm" style="display:none;">
      <div class="card-title"><i class="fa-solid fa-user-plus" style="color:var(--accent);"></i> Registro</div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="Correo electrónico" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Contraseña (mínimo 8 caracteres)" required minlength="8">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="regRol" required>
          <option value="">Seleccione rol...</option>
          <option value="donante">Donante</option>
          <option value="refugio">Refugio</option>
          <option value="centro_salud">Centro de Salud</option>
          <option value="centro_acopio">Centro de Acopio</option>
          <option value="voluntario">Voluntario Transporte</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nombre completo o del punto</label>
        <input type="text" id="regNombre" placeholder="Nombre completo o del punto" maxlength="100" required>
      </div>
      <div class="form-group">
        <label>Teléfono (obligatorio)</label>
        <input type="tel" id="regTelefono" placeholder="Teléfono" maxlength="15" pattern="[0-9]{7,15}" required>
      </div>
      <div class="form-group">
        <label>Dirección (opcional)</label>
        <div class="search-box">
          <input type="text" id="buscarDireccion" placeholder="Buscar dirección" autocomplete="off">
          <div class="search-results" id="sugerencias"></div>
        </div>
      </div>
      <button type="button" id="btnGPS" class="btn btn-outline" style="margin-top: 8px;">
        <i class="fa-solid fa-location-crosshairs"></i> Usar mi ubicación actual
      </button>
      <div id="mapa" class="map" style="display:none;"></div>
      <input type="hidden" id="lat">
      <input type="hidden" id="lon">
      <button id="btnRegistro" class="btn btn-primary" style="margin-top:16px;">Registrarse</button>
      <p style="text-align:center; margin-top:16px;"><a id="linkLogin">Volver al inicio de sesión</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="componentes/mensaje.js"></script>
  <script src="componentes/mapa-ubicacion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    Mensaje.init('mensaje');
    const sb = supabase.createClient('https://kxqwxiolouhrwddaqynp.supabase.co', 'sb_publishable_iJt58cRTDAYH_j_Mv1bJ4g_g0HdRlBF');

    MapaUbicacion.init({
      mapaContenedorId: 'mapa',
      inputDireccionId: 'buscarDireccion',
      resultadosDireccionId: 'sugerencias',
      inputLatId: 'lat',
      inputLonId: 'lon',
      mostrarBotonGPS: true,
      mostrarGuardarPerfil: false,
      zoomInicial: 6
    });

    document.getElementById('linkRegistro').onclick = (e) => {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registroForm').style.display = 'block';
    };
    document.getElementById('linkLogin').onclick = (e) => {
      e.preventDefault();
      document.getElementById('registroForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    };

    document.getElementById('btnGPS').onclick = () => {
      if (!navigator.geolocation) { alert('Geolocalización no soportada.'); return; }
      const btn = document.getElementById('btnGPS');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Buscando...';
      btn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          if (MapaUbicacion._mapa) {
            MapaUbicacion._mapa.setView([lat, lon], 15);
            MapaUbicacion._colocarMarcador(lat, lon);
            MapaUbicacion._geocodificarInversa(lat, lon);
          }
          btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Usar mi ubicación actual';
          btn.disabled = false;
        },
        () => {
          alert('No se pudo obtener la ubicación GPS.');
          btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Usar mi ubicación actual';
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    };

    function redirigirSegunRol(rol) {
      if (rol === 'super_admin') window.location.href = 'dashboard-admin.html';
      else if (rol === 'refugio') window.location.href = 'dashboard-refugio.html';
      else if (rol === 'centro_salud') window.location.href = 'dashboard-hospital.html';
      else if (rol === 'centro_acopio') window.location.href = 'dashboard-acopio.html';
      else if (rol === 'voluntario') window.location.href = 'voluntario.html';
      else if (rol === 'donante') window.location.href = 'dashboard-donante.html';
      else window.location.href = 'dashboard-donante.html';
    }

    document.getElementById('btnLogin').onclick = async () => {
      const btn = document.getElementById('btnLogin');
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pw = document.getElementById('loginPassword').value;

      if (!email.includes('@')) {
        Mensaje.mostrar('❌ Correo inválido', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;

        const perfilData = await apiFetch('/api/perfil', {
          headers: { Authorization: 'Bearer ' + data.session.access_token }
        });

        if (!perfilData.success || !perfilData.data || !perfilData.data.rol) {
          await sb.auth.signOut();
          throw new Error('Perfil incompleto. No se puede determinar el rol.');
        }

        // Generar identificador único de sesión para el control de sesión única
        const sessionId = crypto.randomUUID();
        localStorage.setItem('sessionId', sessionId);
        setAuth(data.session.access_token, perfilData.data);

        // Actualizar la sesión en la BD para evitar falsos conflictos al iniciar sesión
                // Actualizar la sesión en la BD y esperar a que termine antes de redirigir
        if (perfilData.data.rol === 'voluntario') {
          await fetch(API_BASE + '/api/voluntarios/liberar-sesion', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + data.session.access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ nuevo_session_id: sessionId })
          }).catch(() => {});
        }

        redirigirSegunRol(perfilData.data.rol);
      } catch (e) {
        let textoError = e.message || 'Error desconocido';
        if (textoError.includes('Invalid login credentials')) textoError = 'Correo o contraseña incorrectos';
        Mensaje.mostrar('❌ ' + textoError, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Ingresar';
      }
    };

    document.getElementById('btnRegistro').onclick = async function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registrando...';

      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const pw = document.getElementById('regPassword').value;
      const rol = document.getElementById('regRol').value;

      if (!email.includes('@') || pw.length < 8 || !rol) {
        Mensaje.mostrar('❌ Complete todos los campos correctamente', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Registrarse';
        return;
      }

      const nombreInput = document.getElementById('regNombre').value.trim();
      const telefonoInput = document.getElementById('regTelefono').value.trim();

      if (!nombreInput || !telefonoInput) {
        Mensaje.mostrar('❌ El nombre y teléfono son obligatorios', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Registrarse';
        return;
      }

      try {
        const { data, error } = await sb.auth.signUp({ email, password: pw });
        if (error) throw error;

        const token = data.session.access_token;
        const perfil = { rol: rol, nombre: nombreInput, telefono: telefonoInput };

        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);
        if (!isNaN(lat) && !isNaN(lon)) {
          perfil.lat = lat;
          perfil.lon = lon;
        }

        const res = await fetch('https://sos-venezuela-backend.onrender.com/api/perfil', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify(perfil)
        });
        if (!res.ok) {
          await sb.auth.signOut();
          const errorData = await res.json().catch(() => ({}));
          throw new Error(errorData.error?.message || 'Error al guardar el perfil');
        }
        const perfilData = await res.json();
        setAuth(token, perfilData.data);
        redirigirSegunRol(rol);
      } catch (e) {
        let textoError = e.message || 'Error desconocido';
        if (textoError.includes('already registered') || textoError.includes('already been registered')) {
          Mensaje.mostrar('⚠️ Este correo ya está registrado.', 'error');
        } else {
          Mensaje.mostrar('❌ ' + textoError, 'error');
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Registrarse';
      }
    };
  </script>
</body>
</html>
