<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Auth</title></head>
<body>
  <input type="text" id="email" placeholder="correo@test.com">
  <input type="password" id="password" placeholder="Contraseña123">
  <button onclick="registrar()">Registrar</button>
  <pre id="resultado"></pre>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient('https://kxqwxiolouhrwddaqynp.supabase.co', 'sb_publishable_iJt58cRTDAYH_j_Mv1bJ4g_g0HdRlBF');
    async function registrar() {
      const e = document.getElementById('email').value.trim().toLowerCase();
      const p = document.getElementById('password').value;
      const { data, error } = await sb.auth.signUp({ email: e, password: p });
      document.getElementById('resultado').textContent = error ? 'ERROR: ' + error.message : 'OK: ' + JSON.stringify(data.user);
    }
  </script>
</body>
</html>
