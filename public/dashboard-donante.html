<!-- // @build: 2026-06-30.05-10-00 | id: DON-INICIO-V2 | desc: Página de inicio del donante con KPIs y actividad reciente, adaptada del dashboard original -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SOS Venezuela | Inicio Donante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>SOS <span>Venezuela</span></h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="actualizarUbicacionGPS()" title="Actualizar mi ubicación">
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>
      <button class="icon-btn" onclick="cerrarSesion()" title="Cerrar sesión">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
      <div class="user-info">
        <p>Bienvenido</p>
        <strong id="donante-nombre">Donante</strong>
      </div>
      <div class="avatar" id="donante-avatar">DO</div>
    </div>
  </header>

  <div class="container">
    <div id="mensaje" class="mensaje"></div>

    <div class="welcome">
      <h2>Mi Panel</h2>
      <p>Resumen de tu impacto humanitario</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:#eff6ff;color:var(--accent);"><i class="fa-solid fa-box-open"></i></div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Donadas</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#ecfdf5;color:var(--success);"><i class="fa-solid fa-people-group"></i></div>
        <div class="stat-value" id="stat-impacto">0</div>
        <div class="stat-label">Ítems Donados</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-solid fa-clock-rotate-left" style="color:var(--accent);"></i> Actividad Reciente</div>
      <div id="actividad-reciente"><div class="loading">Cargando...</div></div>
    </div>
  </div>

  <nav id="bottom-nav-donante"></nav>

  <script src="app.js"></script>
  <script src="componentes/mensaje.js"></script>
  <script src="componentes/bottom-nav.js"></script>
  <script>
    if (!verificarSesion(['donante'])) throw new Error('Acceso denegado');
BottomNav.init({ contenedorId: 'bottom-nav-donante' });    document.getElementById('donante-nombre').textContent = perfil.nombre_punto || 'Donante';
    document.getElementById('donante-avatar').textContent = (perfil.nombre_punto || 'DO').substring(0, 2).toUpperCase();

    async function cargarActividad() {
      const div = document.getElementById('actividad-reciente');
      try {
        const res = await apiFetch('/api/donaciones/historial');
        const donaciones = res.data || [];
        const activas = donaciones.filter(d => d.estado !== 'cancelada');
        document.getElementById('stat-total').textContent = activas.length;
        document.getElementById('stat-impacto').textContent = activas.reduce((s, d) => s + (d.detalle_donacion?.reduce((ss, dd) => ss + dd.cantidad, 0) || 0), 0);
        if (donaciones.length === 0) {
          div.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open" style="font-size:48px;opacity:0.3;"></i><p style="margin-top:15px;">Aún no has realizado donaciones</p></div>';
          return;
        }
        const recientes = donaciones.slice(0, 5);
        div.innerHTML = recientes.map(d => {
          const productos = d.detalle_donacion?.map(det => {
            const insumo = det.catalogo_items?.nombre_generico || det.detalle || 'Insumo';
            return `${det.cantidad} ${det.unidad || 'unid.'} ${insumo}`;
          }).join(', ') || 'Sin productos';
          const estadoClass = d.estado === 'recibida' || d.estado === 'distribuida' || d.estado === 'entregada' ? 'badge-recibida' : d.estado === 'cancelada' || d.estado === 'totalmente_rechazada' ? 'badge-cancelada' : d.estado === 'asignada' || d.estado === 'en_transito_a_acopio' ? 'badge-en_transito' : 'badge-ofrecida';
          return `<div class="donacion-item">
            <div class="donacion-header"><div class="donacion-title">${productos}</div><span class="badge ${estadoClass}">${d.estado.replace(/_/g, ' ')}</span></div>
            <div class="donacion-detail">Acopio: ${d.acopio_destino?.nombre_punto || 'Asignado'}</div>
            <div class="donacion-detail">Fecha: ${new Date(d.creado_en).toLocaleDateString('es-VE')}</div>
          </div>`;
        }).join('');
      } catch { div.innerHTML = '<div class="empty-state"><p style="color:var(--danger);">Error al cargar actividad</p></div>'; }
    }

    async function actualizarUbicacionGPS() {
      if (!navigator.geolocation) { Mensaje.mostrar('GPS no soportado', 'error'); return; }
      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        try {
          await apiFetch('/api/perfil', { method: 'POST', body: JSON.stringify({ rol: perfil.rol, nombre: perfil.nombre_punto || perfil.nombre, telefono: perfil.telefono || '', lat, lon }) });
          perfil.lat = lat; perfil.lon = lon;
          Mensaje.mostrar('📍 Ubicación actualizada', 'exito');
        } catch (e) { Mensaje.mostrar('❌ Error', 'error'); }
      }, () => { Mensaje.mostrar('No se pudo obtener ubicación', 'error'); }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function cerrarSesion() { if (confirm('¿Cerrar sesión?')) { logout(); } }

    cargarActividad();
  </script>
</body>
</html>
