<!-- // @build: 2026-07-01.21-15-00 | id: VOL-SPA-V13 | desc: Panel de detalles compacto sin scroll, mejoras integradas -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SOS Venezuela | Conductor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
  <style>
    .spa-vista { display: none; opacity: 0; transition: opacity 0.2s ease; }
    .spa-vista.active { display: block; opacity: 1; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    #mapa-servicios { height: calc(100vh - 120px); width: 100%; border-radius: var(--radius-md); border: 1px solid var(--border); background: #e5e7eb; }
    #mapa-viaje-activo { height: 100vh; width: 100%; border-radius: 0; border: none; background: #e5e7eb; }
    .bottom-sheet {
      position: fixed; z-index: 1000; bottom: 60px; left: 0; right: 0; padding-bottom: 70px;
      transition: transform 0.3s ease, visibility 0.3s ease, opacity 0.3s ease;
      visibility: visible; opacity: 1; max-height: 50vh; background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px); border-top: 1px solid var(--border);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow-y: auto;
      box-shadow: 0 -8px 25px rgba(15,23,42,0.08);
    }
    .bottom-sheet .servicio-item { margin: 8px 12px; cursor: pointer; }
    .btn-accion { font-size: 17px; padding: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .paginacion { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
    .paginacion button { width: auto; padding: 10px 20px; }
    .paginacion span { font-size: 14px; color: var(--text-muted); }
    .bottom-sheet.oculta { transform: translateY(100%); visibility: hidden; opacity: 0; }

    #panel-detalles-viaje {
      position: fixed; bottom: 0; left: 0; right: 0; background: white;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transform: translateY(calc(100% - 36px));
      transition: transform 0.3s ease;
      z-index: 1000;
      padding: 8px 12px 12px;
      max-height: 65vh; overflow-y: auto;
      pointer-events: none;
    }
    #panel-detalles-viaje.abierto {
      transform: translateY(0);
      pointer-events: auto;
    }
    #panel-detalles-viaje #flecha-detalles {
      pointer-events: auto;
    }

    .btn-flotante-maps {
      position: fixed; top: 75px; right: 12px; z-index: 2000;
      width: 44px; height: 44px; border-radius: 50%; background: white;
      border: 1px solid var(--border); box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--accent); cursor: pointer;
    }
    .btn-flotante-maps i { 
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; line-height: 1;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>SOS <span>Ruta</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="btn-modo-conductor" onclick="VoluntarioModoConductor.toggle()" title="Modo Trabajo">
        <i class="fa-solid fa-toggle-off"></i>
      </button>
      <button class="icon-btn" id="btn-gps-header" onclick="VoluntarioGPS.actualizar()" title="Sincronizar GPS">
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>
      <button class="icon-btn" id="btn-cerrar-header" onclick="VoluntarioApp.cerrarSesion()" title="Cerrar Sesión">
        <i class="fa-solid fa-power-off"></i>
      </button>
      <div class="user-info">
        <p>Conductor</p>
        <strong id="voluntario-nombre">VL</strong>
      </div>
      <div class="avatar" id="voluntario-avatar" onclick="VoluntarioRouter.navegar('perfil')">VL</div>
    </div>
  </header>

  <div style="max-width:100%; padding:0;">
    <div id="mensaje" class="mensaje" style="margin:8px 12px;"></div>

    <div id="vista-explorar" class="spa-vista active">
      <div id="mapa-servicios"></div>
      <div class="bottom-sheet" id="bottom-sheet">
        <div style="display:flex; gap:8px; padding:12px;">
          <button class="btn btn-outline active btn-sm" id="filtro-todos" onclick="VoluntarioExplorar.filtrarServicios('todos')">📋 Todos</button>
          <button class="btn btn-outline btn-sm" id="filtro-recolecciones" onclick="VoluntarioExplorar.filtrarServicios('recolecciones')">📦 Recolecciones</button>
          <button class="btn btn-outline btn-sm" id="filtro-distribuciones" onclick="VoluntarioExplorar.filtrarServicios('distribuciones')">🚚 Distribuciones</button>
        </div>
        <div id="lista-servicios" style="padding:0 12px;"><div class="loading">Buscando viajes cercanos...</div></div>
        <div class="paginacion" id="paginacion-servicios" style="display:none;"></div>
      </div>
    </div>

    <div id="vista-viaje-activo" class="spa-vista">
      <div id="mapa-viaje-activo"></div>
      <div class="btn-flotante-maps" id="btn-google-maps" title="Abrir en Google Maps" style="display:none;">
        <i class="fa-solid fa-paper-plane"></i>
      </div>
      <div id="panel-detalles-viaje">
        <div style="text-align:center; margin-bottom:4px; cursor:pointer;" id="flecha-detalles"><span>▲</span></div>
        <div id="detalles-viaje-contenido" style="padding: 2px 0; font-size: 13px;">
         
                   <!-- Cliente (donante o centro de acopio) -->
          <div style="display:flex; align-items:center; gap:6px; padding: 5px 0;">
            <i id="detalle-icono-cliente" class="fa-solid fa-circle-user" style="font-size:14px;"></i>
            <span id="detalle-etiqueta-cliente" style="font-weight:600;">Nombre:</span>
            <span id="detalle-cliente-nombre" style="flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
          </div>
          <!-- Origen -->
<div style="display:flex; align-items:flex-start; gap:6px; padding: 5px 0;">
  <i class="fa-solid fa-location-dot" style="color:#16a34a; font-size:14px; margin-top:2px;"></i><p>Origen:</p>
  <div style="flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
    <span style="font-weight:700;" id="detalle-origen-nombre"></span>
    <span style="color:var(--text-muted); margin-left:4px;" id="detalle-origen-direccion"></span>
  </div>
</div>
          
         <!-- Destino -->
<div style="display:flex; align-items:flex-start; gap:6px; padding: 5px 0;">
  <i class="fa-solid fa-flag-checkered" style="color:#dc2626; font-size:14px; margin-top:2px;"></i><p>Destino:</p>
  <div style="flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
    <span style="font-weight:700;" id="detalle-destino-nombre"></span>
    <span style="color:var(--text-muted); margin-left:4px;" id="detalle-destino-direccion"></span>
  </div>
</div>
          <!-- Productos -->
          <div style="display:flex; align-items:flex-start; gap:6px; padding: 5px 0;">
            <i class="fa-solid fa-box" style="color:#2563eb; font-size:14px; margin-top:2px;"></i><p>Recursos:</p>
            <div style="flex:1; min-width:0; font-weight:500;" id="detalle-productos"></div>
          </div>
          <!-- ETA, Duración, Distancia -->
          <div style="display:flex; gap:4px; padding: 4px 0;">
            <div style="flex:1; text-align:center; background:#f8fafc; border-radius:8px; padding:4px;">
              <div style="font-size:10px; color:var(--text-muted);">⏱ ETA</div>
              <div id="detalle-eta" style="font-weight:700; font-size:14px;">--</div>
            </div>
            <div style="flex:1; text-align:center; background:#f8fafc; border-radius:8px; padding:4px;">
              <div style="font-size:10px; color:var(--text-muted);">⏱ DURACIÓN</div>
              <div id="detalle-temporizador" style="font-weight:700; font-size:14px;">00:00</div>
            </div>
            <div style="flex:1; text-align:center; background:#f8fafc; border-radius:8px; padding:4px;">
              <div style="font-size:10px; color:var(--text-muted);">📏 DIST.</div>
              <div id="detalle-distancia" style="font-weight:700; font-size:14px;">--</div>
            </div>
          </div>
          <!-- Botones de contacto -->
          <div style="display:flex; gap:6px; padding: 2px 0;">
            <button class="btn btn-outline" id="btn-llamar" style="flex:1; padding:6px; font-size:13px;"><i class="fa-solid fa-phone"></i> Llamar</button>
            <button class="btn btn-outline" id="btn-whatsapp" style="flex:1; padding:6px; font-size:13px; background:#25D366; color:white; border-color:#25D366;"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
          </div>
        </div>
      </div>
      <div id="barra-acciones-viaje" style="position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; z-index:1000;">
        <button class="btn btn-success" id="btn-accion-principal" style="flex:1;">✅ Ya tengo la donación</button>
        <button class="btn btn-danger" id="btn-cancelar-viaje" style="flex:1;">🗑️ Cancelar</button>
      </div>
    </div>

    <div id="vista-mis-viajes" class="spa-vista">
      <div style="padding:16px;">
        <h2>📋 Mis Viajes</h2>
        <div id="retomar-viaje-container" style="display:none; margin-bottom:15px;">
          <button class="btn btn-primary" onclick="VoluntarioRouter.navegar('viaje-activo')">🔄 Retomar viaje activo</button>
        </div>
        <div class="form-group" style="margin-bottom:15px;">
          <select id="filtro-estado-viajes" onchange="VoluntarioMisViajes.cambiarFiltro(this.value)" style="width:100%;">
            <option value="activos">🟢 En curso</option>
            <option value="completados">✅ Completados</option>
            <option value="todos">📋 Todos</option>
          </select>
        </div>
        <div id="lista-mis-viajes"><div class="loading">Cargando historial...</div></div>
        <div class="paginacion" id="paginacion-mis-viajes" style="display:none;"></div>
      </div>
    </div>

    <div id="vista-perfil" class="spa-vista">
      <div style="padding:16px;">
        <h2>👤 Mi Ficha de Transportista</h2>
        <div class="card" id="perfil-contenido"><div class="loading">Cargando perfil...</div></div>
      </div>
    </div>
  </div>

  <nav id="bottom-nav-voluntario"></nav>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-contenido"></div>
  </div>

  <script src="app.js"></script>
  <script src="componentes/mensaje.js"></script>
  <script src="componentes/bottom-nav.js"></script>
  <script src="componentes/modal.js"></script>
  <script src="componentes/mapa-ubicacion.js"></script>
  <script src="componentes/voluntario/utils.js?v=V13"></script>
  <script src="componentes/voluntario/app-state.js?v=V13"></script>
  <script src="componentes/voluntario/router.js?v=V13"></script>
  <script src="componentes/voluntario/notificaciones.js?v=V13"></script>
  <script src="componentes/voluntario/modo-conductor.js?v=V13"></script>
  <script src="componentes/voluntario/cancelar-modal.js?v=V13"></script>
  <script src="componentes/voluntario/explorar.js?v=V13"></script>
  <script src="componentes/voluntario/viaje-activo.js?v=V13"></script>
  <script src="componentes/voluntario/mis-viajes.js?v=V13"></script>
  <script src="componentes/voluntario/perfil.js?v=V13"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ================================================================
    // ENSAMBLADOR LIGERO — INICIALIZACIÓN
    // ================================================================
    if (!verificarSesion(['voluntario'])) throw new Error('Acceso denegado');
    const sb = supabase.createClient('https://kxqwxiolouhrwddaqynp.supabase.co', 'sb_publishable_iJt58cRTDAYH_j_Mv1bJ4g_g0HdRlBF');
    Mensaje.init('mensaje');
    Modal.init('modal-overlay', 'modal-contenido');

    window.toggleLista = function() {
      const sheet = document.getElementById('bottom-sheet');
      if (sheet) sheet.classList.toggle('oculta');
    };

    window.VoluntarioApp = {
      async cerrarSesion() {
        if (confirm('¿Cerrar sesión?')) {
          VoluntarioNotificaciones.limpiarSesion();
          VoluntarioNotificaciones.limpiarEntrega();
          if (VoluntarioStateCore.modoConductor) await VoluntarioModoConductor.toggle();
          logout();
        }
      }
    };

    window.VoluntarioGPS = {
      async actualizar() {
        if (VoluntarioStateCore.viajeEnCurso) return;
        if (!navigator.geolocation) { Mensaje.mostrar('GPS no disponible', 'error'); return; }
        navigator.geolocation.getCurrentPosition(async pos => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          try {
            await apiFetch('/api/perfil', { method: 'POST', body: JSON.stringify({ rol: 'voluntario', nombre: perfil.nombre_punto || perfil.nombre, telefono: perfil.telefono || '', lat, lon }) });
            perfil.lat = lat; perfil.lon = lon;
            if (VoluntarioStateCore.perfil) { VoluntarioStateCore.perfil.lat = lat; VoluntarioStateCore.perfil.lon = lon; }
            Mensaje.mostrar('📍 Ubicación sincronizada', 'exito');
            if (VoluntarioExplorar.mapaServicios) VoluntarioExplorar.mapaServicios.setView([lat, lon], 13);
          } catch (e) { Mensaje.mostrar('❌ Error al sincronizar GPS', 'error'); }
        }, () => { Mensaje.mostrar('No se pudo obtener ubicación', 'error'); }, { enableHighAccuracy: true, timeout: 10000 });
      }
    };

    document.getElementById('voluntario-nombre').innerText = (perfil.nombre_punto || 'VL').substring(0, 10);
    document.getElementById('voluntario-avatar').innerText = (perfil.nombre_punto || 'VL').substring(0, 2).toUpperCase();

    BottomNav.init({
      contenedorId: 'bottom-nav-voluntario',
      secciones: [
        { id: 'toggle-lista', icono: 'fa-solid fa-list', label: 'Lista', accion: toggleLista },
        { id: 'explorar', icono: 'fa-solid fa-map-location-dot', label: 'Explorar', href: '#explorar' },
        { id: 'mis-viajes', icono: 'fa-solid fa-route', label: 'Mis Viajes', href: '#mis-viajes' }
      ],
      onChange: (seccion) => { if (seccion !== 'toggle-lista') VoluntarioRouter.navegar(seccion); }
    });

    window.addEventListener('DOMContentLoaded', () => { VoluntarioRouter.init(); });
  </script>
</body>
</html>
